version: '3.8'

services:
  # ==========================================
  # Database Service (MongoDB)
  # ==========================================
  mongodb:
    image: mongo:7
    container_name: astronet-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: astronet
    volumes:
      - mongodb_data:/data/db
    networks:
      - astronet-network

  # ==========================================
  # Backend API Service (Express)
  # ==========================================
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: astronet-server
    restart: unless-stopped
    ports:
      - '${PORT:-5000}:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/astronet}
      JWT_SECRET: ${JWT_SECRET:-astronet_super_secret_jwt_key_change_in_production_2024}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: ${CLIENT_URL}
      LOG_LEVEL: info
    depends_on:
      - mongodb
    networks:
      - astronet-network

  # ==========================================
  # Frontend Service (React + Nginx)
  # ==========================================
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${API_URL}
    container_name: astronet-client
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - server
    networks:
      - astronet-network

  # ==========================================
  # HashiCorp Vault (Secrets Management)
  # ==========================================
  vault:
    image: hashicorp/vault:1.15
    container_name: astronet-vault
    restart: unless-stopped
    ports:
      - '8200:8200'
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - ./vault/vault-config.hcl:/vault/config/vault-config.hcl
    networks:
      - astronet-network

  # ==========================================
  # Prometheus (Monitoring Metrics Collector)
  # ==========================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: astronet-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - astronet-network

  # ==========================================
  # Grafana (Metrics Visualizer)
  # ==========================================
  grafana:
    image: grafana/grafana:10.2.2
    container_name: astronet-grafana
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - astronet-network

  # ==========================================
  # Elasticsearch (Log Engine)
  # ==========================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: astronet-elasticsearch
    restart: unless-stopped
    ports:
      - '9200:9200'
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - astronet-network

  # ==========================================
  # Logstash (Log Processing Pipeline)
  # ==========================================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.1
    container_name: astronet-logstash
    restart: unless-stopped
    ports:
      - '5044:5044'
      - '50000:50000/tcp'
      - '50000:50000/udp'
    volumes:
      - ./logging/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    depends_on:
      - elasticsearch
    networks:
      - astronet-network

  # ==========================================
  # Kibana (Log Visualization Dashboard)
  # ==========================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: astronet-kibana
    restart: unless-stopped
    ports:
      - '5601:5601'
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - astronet-network

volumes:
  mongodb_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:

networks:
  astronet-network:
    driver: bridge
