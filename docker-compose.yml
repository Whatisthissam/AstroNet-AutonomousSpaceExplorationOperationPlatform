version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: astronet-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: astronet
    volumes:
      - mongodb_data:/data/db
    networks:
      - astronet-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: astronet-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/astronet
      JWT_SECRET: ${JWT_SECRET:-astronet_super_secret_change_me}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongodb
    networks:
      - astronet-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: astronet-client
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - server
    networks:
      - astronet-network

volumes:
  mongodb_data:

networks:
  astronet-network:
    driver: bridge
