<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Clip path to only render the front-left section of the orbit ring -->
    <clipPath id="frontClip">
      <rect x="0" y="0" width="295" height="512" />
    </clipPath>
  </defs>

  <!-- Solid Black Background -->
  <rect width="512" height="512" rx="96" fill="#000000" />

  <!-- Symmetrical Bold Letter A (White, Scaled Up) -->
  <polygon points="200,30 312,30 462,470 360,470 256,200 152,470 50,470" fill="#ffffff" />

  <!-- Orbit Ring - Back Section (Black outline + White ring, Scaled Up) -->
  <ellipse cx="256" cy="290" rx="220" ry="65" transform="rotate(-18 256 290)" fill="none" stroke="#000000" stroke-width="48" />
  <ellipse cx="256" cy="290" rx="220" ry="65" transform="rotate(-18 256 290)" fill="none" stroke="#ffffff" stroke-width="28" />

  <!-- Black Planet Circle (covers the back section of the ring on the right, Scaled Up) -->
  <circle cx="256" cy="290" r="115" fill="#000000" />

  <!-- Orbit Ring - Front Section (Clipped to front-left to overlay the planet, Scaled Up) -->
  <ellipse cx="256" cy="290" rx="220" ry="65" transform="rotate(-18 256 290)" clip-path="url(#frontClip)" fill="none" stroke="#000000" stroke-width="48" />
  <ellipse cx="256" cy="290" rx="220" ry="65" transform="rotate(-18 256 290)" clip-path="url(#frontClip)" fill="none" stroke="#ffffff" stroke-width="28" />
</svg>