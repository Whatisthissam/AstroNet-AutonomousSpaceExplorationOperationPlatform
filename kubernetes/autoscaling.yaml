# ==========================================
# Kubernetes Horizontal Pod Autoscalers (HPA)
# ==========================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: astronet-backend-hpa
  namespace: astronet
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: astronet-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: astronet-frontend-hpa
  namespace: astronet
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: astronet-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
