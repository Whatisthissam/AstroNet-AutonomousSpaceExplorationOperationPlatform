# ==========================================
# Prometheus Main Configuration File
# ==========================================

global:
  scrape_interval: 15s     # Frequency of metric collections
  evaluation_interval: 15s # Frequency to evaluate alert rules
  scrape_timeout: 10s      # Request timeout limit

  # Custom global label attachments
  external_labels:
    monitor: 'astronet-monitoring-system'

# Alertmanager configuration (Uncomment and configure for live paging alerts)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           # - alertmanager:9093

# Rules configuration (Contains threshold conditions for triggers)
rule_files:
  # - "alert.rules.yml"

# Scrape jobs configurations defining data collection endpoints
scrape_configs:
  # 1. Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 2. AstroNet Express API Backend
  # Scrapes custom runtime telemetry e.g., active user sessions, mission count, response latency
  - job_name: 'astronet-backend'
    scrape_interval: 5s # Higher resolution scraping for mission telemetry
    metrics_path: '/api/devops/status' # Existing endpoint that mocks/provides service details
    static_configs:
      - targets: ['server:5000']
        labels:
          group: 'application'

  # 3. AstroNet React Frontend Nginx Instance
  # Scrapes connection metrics from Nginx stub status if enabled
  - job_name: 'astronet-frontend'
    metrics_path: '/nginx_status'
    static_configs:
      - targets: ['client:80']
        labels:
          group: 'ingress'

  # 4. HashiCorp Vault Monitoring
  # Vault exposes Prometheus metrics directly under v1/sys/metrics
  - job_name: 'hashicorp-vault'
    metrics_path: '/v1/sys/metrics'
    params:
      format: ['prometheus']
    bearer_token: 'root' # Development token credentials
    static_configs:
      - targets: ['vault:8200']
        labels:
          group: 'security'

  # 5. Node Exporter (System Host Metrics)
  # Captures host level CPU, Disk, Network, Memory telemetry
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          group: 'infrastructure'
