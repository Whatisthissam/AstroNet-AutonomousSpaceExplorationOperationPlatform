# ==========================================
# Logstash Pipeline Configuration
# ==========================================

input {
  # 1. Beats Input (for Filebeat forwarders on hosts/pods)
  beats {
    port => 5044
  }

  # 2. TCP Input (for direct application logging, e.g., winston tcp transport)
  tcp {
    port => 50000
    codec => json
  }

  # 3. UDP Input (alternative for lightweight, non-blocking logs)
  udp {
    port => 50000
    codec => json
  }
}

filter {
  # If the logs come from Winston as JSON, parse them and format fields
  if [logger] == "winston" or [level] != "" {
    mutate {
      add_field => { "application" => "astronet-service" }
    }
  }
  
  # Format log timestamp field to logstash root timestamp
  if [timestamp] {
    date {
      match => [ "timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS" ]
      target => "@timestamp"
      remove_field => [ "timestamp" ]
    }
  }

  # Standard user agent parsing for frontend traffic logs
  if [headers][user-agent] {
    useragent {
      source => "[headers][user-agent]"
      target => "user_agent"
    }
  }
}

output {
  # Write all processed logs into Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "astronet-logs-%{+YYYY.MM.dd}"
    # If authentication is enabled in production, supply credentials:
    # user => "elastic"
    # password => "elastic_password"
  }

  # Echo logs to stdout console of logstash container for ease of debugging
  stdout {
    codec => rubydebug
  }
}
